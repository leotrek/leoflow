workflow:
  name: wildfire-detection-executable
  version: 0.1.0

data:
  source:
    kind: stac
    name: stac_sentinel_2
    api_url: https://earth-search.aws.element84.com/v1/search
    collection: sentinel-2-l2a
    assets:
      - blue
      - green
      - red
      - nir
      - swir22
      - scl
    limit: 1
  region: polygon.geojson
  time: 2025-06-01/2025-08-01
  resolution: 10m

preprocessing:
  - command:
      run: python3 tasks/custom/preprocess.py --input "{data_dir}" --output "{preprocess_dir}"
      output: "{preprocess_dir}"
  - cloud_mask: s2cloudless
  - resample: 10m
  - align_time: 5d

features:
  - ndvi
  - ndwi

model:
  type: segmentation
  input: patches(256x256)
  output: fire_mask
  source:
    kind: huggingface
    repo_id: your-org/wildfire-segmentation
    revision: main
    filename: model.onnx
  executor:
    run: python3 tasks/custom/infer.py --model "{model_path}" --input "{data_dir}" --output "{prediction_dir}"
    artifact: "{prediction_dir}/fire_mask.tif"

evaluation:
  metrics:
    - iou
    - temporal_consistency
  executor:
    run: python3 tasks/custom/evaluate.py --predictions "{prediction_dir}" --report "{artifacts_dir}/evaluation.json"
    artifact: "{artifacts_dir}/evaluation.json"
